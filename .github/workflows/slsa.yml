# =============================================================================
# CVERiskPilot — SLSA Level 3 Provenance Attestation
# =============================================================================
# Generates SLSA provenance for the Docker container image.
# Uses slsa-framework/slsa-github-generator for tamper-proof build provenance.
#
# Image registry: gcr.io/$PROJECT_ID/cveriskpilot-web
# (mirrors deploy/cloudbuild-deploy.yaml)
# =============================================================================

name: SLSA Provenance

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cveriskpilot-web

jobs:
  # ── Build and push Docker image ──────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Output image reference
        id: image
        run: |
          echo "image=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

  # ── SLSA provenance generation ───────────────────────────────────────────
  provenance:
    name: SLSA Provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ── Verify provenance (smoke test) ──────────────────────────────────────
  verify:
    name: Verify Provenance
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@v2.6.0

      - name: Verify SLSA provenance
        run: |
          slsa-verifier verify-image \
            "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}" \
            --source-uri "github.com/${{ github.repository }}" \
            --source-branch "main"
