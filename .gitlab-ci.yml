# =============================================================================
# CVERiskPilot — GitLab CI/CD Pipeline
# =============================================================================
# Stages: validate → test → build → deploy
# Deploy to GCP Cloud Run via Artifact Registry on main branch only.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   GCP_PROJECT_ID          — GCP project ID
#   GCP_REGION              — e.g. us-central1
#   GCP_SERVICE_ACCOUNT_KEY — JSON key for CI service account (or use WIF below)
#   GCP_WORKLOAD_IDENTITY_PROVIDER — (recommended) Workload Identity Federation provider
#   GCP_SERVICE_ACCOUNT     — (recommended) SA email for WIF
#   DEPLOY_ENV              — dev | staging | prod (default: dev)
# =============================================================================

stages:
  - validate
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  DEPLOY_ENV: "dev"
  GCP_REGION: "us-central1"
  ARTIFACT_REGISTRY: "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/cveriskpilot"
  IMAGE_NAME: "${ARTIFACT_REGISTRY}/web"
  FF_USE_FASTZIP: "true"  # Faster cache compression

# ---------------------------------------------------------------------------
# Cache: node_modules shared across all jobs in the pipeline
# ---------------------------------------------------------------------------
.node-cache: &node-cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - packages/*/node_modules/
      - apps/*/node_modules/
    policy: pull

# ---------------------------------------------------------------------------
# Base image for Node.js jobs
# ---------------------------------------------------------------------------
.node-base:
  image: node:${NODE_VERSION}-alpine
  before_script:
    - corepack enable
  <<: *node-cache

# =============================================================================
# Stage 1: VALIDATE — install, type-check, lint (parallel)
# =============================================================================

install:
  stage: validate
  extends: .node-base
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - packages/*/node_modules/
      - apps/*/node_modules/
    policy: pull-push  # This job populates the cache
  script:
    - npm ci --ignore-scripts
    - npm run db:generate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

type-check:
  stage: validate
  extends: .node-base
  needs: [install]
  script:
    - npm run db:generate
    - npm run type-check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint:
  stage: validate
  extends: .node-base
  needs: [install]
  script:
    - npm run lint
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# Stage 2: TEST — unit tests with coverage
# =============================================================================

test:unit:
  stage: test
  extends: .node-base
  needs: [install]
  script:
    - npm run db:generate
    - npx vitest run --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# Stage 3: BUILD — Docker image → Artifact Registry
# =============================================================================

build:docker:
  stage: build
  needs: [type-check, lint, test:unit]
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Authenticate to GCP Artifact Registry
    - apk add --no-cache python3 py3-pip
    - pip3 install --break-system-packages google-auth
    - echo "${GCP_SERVICE_ACCOUNT_KEY}" > /tmp/gcp-key.json
    - cat /tmp/gcp-key.json | docker login -u _json_key --password-stdin "https://${GCP_REGION}-docker.pkg.dev"
  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --tag "${IMAGE_NAME}:${SHORT_SHA}" \
        --tag "${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}" \
        --tag "${IMAGE_NAME}:latest" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        --file deploy/Dockerfile \
        .
    - docker push "${IMAGE_NAME}:${SHORT_SHA}"
    - docker push "${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}"
    - docker push "${IMAGE_NAME}:latest"
    - echo "IMAGE_TAG=${SHORT_SHA}" >> build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# Stage 4: DEPLOY — Cloud Run (main branch only, after all checks pass)
# =============================================================================

.deploy-base:
  stage: deploy
  image: google/cloud-sdk:slim
  needs: [build:docker]
  before_script:
    - echo "${GCP_SERVICE_ACCOUNT_KEY}" > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project "${GCP_PROJECT_ID}"
  after_script:
    - rm -f /tmp/gcp-key.json

deploy:web:
  extends: .deploy-base
  script:
    - |
      gcloud run services update "cveriskpilot-web-${DEPLOY_ENV}" \
        --region="${GCP_REGION}" \
        --image="${IMAGE_NAME}:${IMAGE_TAG}" \
        --platform=managed
    - echo "Deployed web service with image tag ${IMAGE_TAG}"
    # Verify deployment health
    - |
      WEB_URL=$(gcloud run services describe "cveriskpilot-web-${DEPLOY_ENV}" \
        --region="${GCP_REGION}" --format='value(status.url)')
    - 'echo "Service URL: ${WEB_URL}"'
    - |
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${WEB_URL}/api/health" || echo "000")
    - |
      if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
        echo "WARNING: Health check returned ${HTTP_STATUS}"
      else
        echo "Health check passed (${HTTP_STATUS})"
      fi
  environment:
    name: ${DEPLOY_ENV}
    url: https://cveriskpilot.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:worker:
  extends: .deploy-base
  script:
    - |
      gcloud run services update "cveriskpilot-worker-${DEPLOY_ENV}" \
        --region="${GCP_REGION}" \
        --image="${IMAGE_NAME}:${IMAGE_TAG}" \
        --platform=managed
    - echo "Deployed worker service with image tag ${IMAGE_TAG}"
  allow_failure: true  # Worker is optional — don't block pipeline
  environment:
    name: ${DEPLOY_ENV}-worker
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
