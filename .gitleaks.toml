# Gitleaks configuration for CVERiskPilot
# https://github.com/gitleaks/gitleaks

title = "CVERiskPilot Gitleaks Config"

[allowlist]
  description = "Known safe patterns"
  paths = [
    '''node_modules''',
    '''.next''',
    '''dist''',
    '''\.sarif$''',
    '''package-lock\.json$''',
    '''\.png$''',
    '''\.jpg$''',
    '''\.svg$''',
    '''\.woff2?$''',
  ]
  # Placeholder/example values in code and docs
  regexes = [
    '''EXAMPLE_''',
    '''YOUR_.*_HERE''',
    '''sk_test_PLACEHOLDER''',
    '''pk_test_PLACEHOLDER''',
  ]
