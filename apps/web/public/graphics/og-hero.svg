<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0ee6f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ee6f6" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0ee6f6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="675"/><line x1="60" y1="0" x2="60" y2="675"/>
    <line x1="120" y1="0" x2="120" y2="675"/><line x1="180" y1="0" x2="180" y2="675"/>
    <line x1="240" y1="0" x2="240" y2="675"/><line x1="300" y1="0" x2="300" y2="675"/>
    <line x1="360" y1="0" x2="360" y2="675"/><line x1="420" y1="0" x2="420" y2="675"/>
    <line x1="480" y1="0" x2="480" y2="675"/><line x1="540" y1="0" x2="540" y2="675"/>
    <line x1="600" y1="0" x2="600" y2="675"/><line x1="660" y1="0" x2="660" y2="675"/>
    <line x1="720" y1="0" x2="720" y2="675"/><line x1="780" y1="0" x2="780" y2="675"/>
    <line x1="840" y1="0" x2="840" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
    <line x1="960" y1="0" x2="960" y2="675"/><line x1="1020" y1="0" x2="1020" y2="675"/>
    <line x1="1080" y1="0" x2="1080" y2="675"/><line x1="1140" y1="0" x2="1140" y2="675"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Glow orb -->
  <circle cx="850" cy="340" r="250" fill="url(#glow)"/>

  <!-- Hex logo mark -->
  <g transform="translate(80, 60)">
    <polygon points="22,0 44,12 44,36 22,48 0,36 0,12" fill="none" stroke="#0ee6f6" stroke-width="1.5" opacity="0.6"/>
    <polygon points="22,8 36,16 36,32 22,40 8,32 8,16" fill="none" stroke="#0ee6f6" stroke-width="1.2" opacity="0.8"/>
    <line x1="22" y1="4" x2="22" y2="18" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="22" y1="30" x2="22" y2="44" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="4" y1="24" x2="18" y2="24" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="26" y1="24" x2="40" y2="24" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <circle cx="22" cy="24" r="3" fill="#0ee6f6"/>
    <path d="M12,10 L8,12 L8,16" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M32,10 L36,12 L36,16" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M12,38 L8,36 L8,32" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M32,38 L36,36 L36,32" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
  </g>

  <!-- Brand name -->
  <text x="140" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700">
    <tspan fill="#94a3b8">CVE</tspan><tspan fill="#0ee6f6">RiskPilot</tspan>
  </text>

  <!-- Main headline -->
  <text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white">Your scanner found</text>
  <text x="80" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="url(#accent)">8,000 CVEs.</text>
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#94a3b8">We tell you which</text>
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#accent)">50 matter.</text>

  <!-- Subtext -->
  <text x="80" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">AI-powered vulnerability management.</text>
  <text x="80" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">Prioritize by real exploit risk, not just CVSS.</text>

  <!-- Dashboard preview (right side) -->
  <g transform="translate(700, 150)" filter="url(#shadow)">
    <!-- Card bg -->
    <rect width="420" height="380" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="420" height="48" rx="16" fill="#1e293b"/>
    <rect y="32" width="420" height="16" fill="#1e293b"/>
    <circle cx="24" cy="24" r="6" fill="#ef4444"/>
    <circle cx="44" cy="24" r="6" fill="#f59e0b"/>
    <circle cx="64" cy="24" r="6" fill="#22c55e"/>
    <text x="200" y="29" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">Dashboard</text>

    <!-- Stat cards row -->
    <g transform="translate(16, 64)">
      <rect width="120" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <text x="12" y="22" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Critical</text>
      <text x="12" y="46" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#ef4444">12</text>

      <rect x="130" width="120" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <text x="142" y="22" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">KEV Listed</text>
      <text x="142" y="46" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#f59e0b">7</text>

      <rect x="260" width="130" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <text x="272" y="22" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Avg EPSS</text>
      <text x="272" y="46" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#3b82f6">0.87</text>
    </g>

    <!-- Severity bars -->
    <g transform="translate(16, 144)">
      <text x="0" y="14" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">Findings by Severity</text>
      <text x="0" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Critical</text>
      <rect x="60" y="28" width="320" height="14" rx="4" fill="#1e293b"/>
      <rect x="60" y="28" width="280" height="14" rx="4" fill="#ef4444"/>

      <text x="0" y="58" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">High</text>
      <rect x="60" y="48" width="320" height="14" rx="4" fill="#1e293b"/>
      <rect x="60" y="48" width="220" height="14" rx="4" fill="#f97316"/>

      <text x="0" y="78" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Medium</text>
      <rect x="60" y="68" width="320" height="14" rx="4" fill="#1e293b"/>
      <rect x="60" y="68" width="160" height="14" rx="4" fill="#eab308"/>

      <text x="0" y="98" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Low</text>
      <rect x="60" y="88" width="320" height="14" rx="4" fill="#1e293b"/>
      <rect x="60" y="88" width="80" height="14" rx="4" fill="#22c55e"/>
    </g>

    <!-- AI Triage indicator -->
    <g transform="translate(16, 270)">
      <rect width="388" height="90" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
      <text x="16" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">AI Triage Active</text>
      <text x="16" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">CVE-2024-3094 (XZ Utils) — EPSS: 0.97 — KEV: Yes</text>
      <text x="16" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444">Priority: CRITICAL — Active exploitation detected</text>
      <text x="16" y="78" font-family="system-ui, sans-serif" font-size="10" fill="#22c55e">Remediation: Update xz-utils to >= 5.6.1+really5.4.5-1</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569">cveriskpilot.com</text>
  <text x="80" y="642" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#334155">100% Veteran Owned Business</text>

  <!-- Bottom accent line -->
  <rect x="0" y="670" width="1200" height="5" fill="url(#accent)"/>
</svg>
