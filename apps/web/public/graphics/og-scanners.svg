<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blueGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg5)"/>

  <!-- Hex logo mark -->
  <g transform="translate(80, 40)">
    <polygon points="22,0 44,12 44,36 22,48 0,36 0,12" fill="none" stroke="#0ee6f6" stroke-width="1.5" opacity="0.6"/>
    <polygon points="22,8 36,16 36,32 22,40 8,32 8,16" fill="none" stroke="#0ee6f6" stroke-width="1.2" opacity="0.8"/>
    <line x1="22" y1="4" x2="22" y2="18" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="22" y1="30" x2="22" y2="44" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="4" y1="24" x2="18" y2="24" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="26" y1="24" x2="40" y2="24" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <circle cx="22" cy="24" r="3" fill="#0ee6f6"/>
    <path d="M12,10 L8,12 L8,16" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M32,10 L36,12 L36,16" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M12,38 L8,36 L8,32" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M32,38 L36,36 L36,32" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
  </g>
  <text x="140" y="68" font-family="system-ui, sans-serif" font-size="20" font-weight="700">
    <tspan fill="#94a3b8">CVE</tspan><tspan fill="#0ee6f6">RiskPilot</tspan>
  </text>

  <!-- Title -->
  <text x="600" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="white">One Platform.</text>
  <text x="600" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#blueGrad5)">Every Scanner.</text>

  <!-- Central hub -->
  <circle cx="600" cy="420" r="70" fill="#1e293b" stroke="url(#blueGrad5)" stroke-width="2"/>
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">CVERisk</text>
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Pilot</text>
  <text x="600" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">Unified View</text>

  <!-- Scanner nodes in circle around hub -->
  <!-- Nessus -->
  <g transform="translate(220, 260)">
    <rect width="130" height="50" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Nessus</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#22c55e">Network Scanner</text>
  </g>
  <line x1="350" y1="285" x2="535" y2="390" stroke="#22c55e" stroke-width="1" opacity="0.4"/>

  <!-- SARIF -->
  <g transform="translate(400, 220)">
    <rect width="130" height="50" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">SARIF</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#3b82f6">SAST Results</text>
  </g>
  <line x1="465" y1="270" x2="565" y2="375" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>

  <!-- Qualys -->
  <g transform="translate(670, 220)">
    <rect width="130" height="50" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Qualys</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444">Vuln Scanner</text>
  </g>
  <line x1="735" y1="270" x2="635" y2="375" stroke="#ef4444" stroke-width="1" opacity="0.4"/>

  <!-- CycloneDX -->
  <g transform="translate(850, 260)">
    <rect width="130" height="50" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">CycloneDX</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b5cf6">SBOM</text>
  </g>
  <line x1="850" y1="285" x2="665" y2="390" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>

  <!-- OpenVAS -->
  <g transform="translate(160, 380)">
    <rect width="130" height="50" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">OpenVAS</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">Open Source</text>
  </g>
  <line x1="290" y1="405" x2="530" y2="415" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>

  <!-- SPDX -->
  <g transform="translate(910, 380)">
    <rect width="130" height="50" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">SPDX</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#06b6d4">SBOM</text>
  </g>
  <line x1="910" y1="405" x2="670" y2="415" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>

