  <g transform="translate(200, 490)">
    <rect width="130" height="50" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">OSV</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ec4899">Open Source Vulns</text>
  </g>
  <line x1="330" y1="515" x2="545" y2="450" stroke="#ec4899" stroke-width="1" opacity="0.4"/>

  <!-- CSAF -->
  <g transform="translate(530, 530)">
    <rect width="130" height="50" rx="10" fill="#1e293b" stroke="#14b8a6" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">CSAF</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">Advisory</text>
  </g>
  <line x1="600" y1="530" x2="600" y2="490" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>

  <!-- CSV/JSON/XLSX -->
  <g transform="translate(870, 490)">
    <rect width="130" height="50" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">CSV/JSON</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">+ XLSX</text>
  </g>
  <line x1="870" y1="515" x2="655" y2="450" stroke="#64748b" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="600" y="635" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#94a3b8">11 formats supported. Upload once, see everything.</text>
  <text x="600" y="658" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">cveriskpilot.com | 100% Veteran Owned Business</text>
  <rect x="0" y="670" width="1200" height="5" fill="url(#blueGrad5)"/>
</svg>
