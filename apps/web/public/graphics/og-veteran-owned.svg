<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="blueGrad6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg6)"/>

  <!-- Star pattern background -->
  <g opacity="0.03" fill="#f59e0b">
    <polygon points="100,50 104,62 117,62 107,70 110,82 100,74 90,82 93,70 83,62 96,62"/>
    <polygon points="300,100 304,112 317,112 307,120 310,132 300,124 290,132 293,120 283,112 296,112"/>
    <polygon points="900,80 904,92 917,92 907,100 910,112 900,104 890,112 893,100 883,92 896,92"/>
    <polygon points="1050,150 1054,162 1067,162 1057,170 1060,182 1050,174 1040,182 1043,170 1033,162 1046,162"/>
    <polygon points="150,500 154,512 167,512 157,520 160,532 150,524 140,532 143,520 133,512 146,512"/>
    <polygon points="1000,450 1004,462 1017,462 1007,470 1010,482 1000,474 990,482 993,470 983,462 996,462"/>
  </g>

  <!-- Hex logo mark -->
  <g transform="translate(80, 40)">
    <polygon points="22,0 44,12 44,36 22,48 0,36 0,12" fill="none" stroke="#0ee6f6" stroke-width="1.5" opacity="0.6"/>
    <polygon points="22,8 36,16 36,32 22,40 8,32 8,16" fill="none" stroke="#0ee6f6" stroke-width="1.2" opacity="0.8"/>
    <line x1="22" y1="4" x2="22" y2="18" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="22" y1="30" x2="22" y2="44" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="4" y1="24" x2="18" y2="24" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="26" y1="24" x2="40" y2="24" stroke="#0ee6f6" stroke-width="0.8" opacity="0.5"/>
    <circle cx="22" cy="24" r="3" fill="#0ee6f6"/>
    <path d="M12,10 L8,12 L8,16" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M32,10 L36,12 L36,16" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M12,38 L8,36 L8,32" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M32,38 L36,36 L36,32" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
  </g>
  <text x="140" y="68" font-family="system-ui, sans-serif" font-size="20" font-weight="700">
    <tspan fill="#94a3b8">CVE</tspan><tspan fill="#0ee6f6">RiskPilot</tspan>
  </text>

  <!-- Badge -->
  <g transform="translate(600, 280)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <circle cx="0" cy="0" r="90" fill="#1e293b"/>
    <!-- Star -->
    <polygon points="0,-55 13,-18 52,-18 20,5 32,42 0,20 -32,42 -20,5 -52,-18 -13,-18" fill="url(#gold)"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="35" fill="#0f172a"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="url(#gold)">100%</text>
  </g>

  <!-- Text -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="white">Veteran Owned</text>
  <text x="600" y="468" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="600" fill="url(#gold)">Small Business</text>

  <!-- Divider -->
  <rect x="450" y="490" width="300" height="2" rx="1" fill="url(#gold)" opacity="0.3"/>

  <!-- Value props -->
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">AI-Powered Vulnerability Management</text>
  <text x="600" y="558" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">Built by security practitioners, for security teams</text>

  <!-- Location -->
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">San Antonio, TX | CVERiskPilot LLC</text>

  <!-- Footer -->
  <text x="600" y="645" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">cveriskpilot.com</text>
  <rect x="0" y="670" width="1200" height="5" fill="url(#gold)"/>
</svg>
