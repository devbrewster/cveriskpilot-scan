steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cveriskpilot-web:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cveriskpilot-web:latest'
      - '-f'
      - 'deploy/Dockerfile'
      - '.'

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/cveriskpilot-web']

options:
  logging: GCS_ONLY
