# =============================================================================
# CVERiskPilot — Cloud Build: Build → Deploy
# =============================================================================
# Trigger: push to main branch
# =============================================================================

steps:
  # ── Build Docker image ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cveriskpilot/web:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cveriskpilot/web:latest'
      - '-f'
      - 'deploy/Dockerfile'
      - '.'

  # ── Push image to GCR ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/cveriskpilot/web']
    waitFor: ['build']

  # ── Update web service image on Cloud Run ─────────────────────────────────
  # Use `services update` instead of `deploy` to avoid overriding Terraform-managed
  # settings (ingress, scaling, env vars, VPC connector, etc.).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-web'
    args:
      - 'gcloud'
      - 'run'
      - 'services'
      - 'update'
      - 'cveriskpilot-web-${_ENV}'
      - '--region=${_REGION}'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/cveriskpilot/web:$SHORT_SHA'
      - '--platform=managed'
    waitFor: ['push']

  # ── Update worker service image on Cloud Run ─────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-worker'
    allowFailure: true
    args:
      - 'gcloud'
      - 'run'
      - 'services'
      - 'update'
      - 'cveriskpilot-worker-${_ENV}'
      - '--region=${_REGION}'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/cveriskpilot/web:$SHORT_SHA'
      - '--platform=managed'
    waitFor: ['push']

substitutions:
  _ENV: 'dev'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
