# =============================================================================
# CVERiskPilot — Cloud Build: Build → Deploy
# =============================================================================
# Trigger: push to main branch
# =============================================================================

steps:
  # ── Build Docker image ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cveriskpilot-web:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cveriskpilot-web:latest'
      - '-f'
      - 'deploy/Dockerfile'
      - '.'

  # ── Push image to GCR ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/cveriskpilot-web']
    waitFor: ['build']

  # ── Deploy web service to Cloud Run ──────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-web'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'cveriskpilot-web-${_ENV}'
      - '--region=${_REGION}'
      - '--image=gcr.io/$PROJECT_ID/cveriskpilot-web:$SHORT_SHA'
      - '--platform=managed'
      - '--ingress=all'
      - '--allow-unauthenticated'
    waitFor: ['push']

  # ── Deploy worker service to Cloud Run ───────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-worker'
    allowFailure: true
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'cveriskpilot-worker-${_ENV}'
      - '--region=${_REGION}'
      - '--image=gcr.io/$PROJECT_ID/cveriskpilot-web:$SHORT_SHA'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
    waitFor: ['push']

substitutions:
  _ENV: 'dev'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
