# =============================================================================
# CVERiskPilot — Cloud Build: Prisma Migrate
# =============================================================================
# Run manually: gcloud builds submit --config=deploy/cloudbuild-migrate.yaml .
# =============================================================================

steps:
  - name: 'node:20-slim'
    id: 'migrate'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq curl openssl > /dev/null 2>&1
        curl -sSL https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64 -o /workspace/cloud-sql-proxy
        chmod +x /workspace/cloud-sql-proxy
        echo "Starting cloud-sql-proxy..."
        /workspace/cloud-sql-proxy ${_CLOUD_SQL_CONNECTION} --port=5432 &
        sleep 5
        echo "Installing dependencies..."
        npm ci --ignore-scripts
        echo "Running prisma migrate deploy..."
        npx prisma migrate deploy --schema=packages/domain/prisma/schema.prisma
        echo "Migration complete!"
    secretEnv: ['DATABASE_URL']

substitutions:
  _CLOUD_SQL_CONNECTION: 'cveriskpilot-prod:us-central1:cveriskpilot-dev'
  _ENV: 'dev'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/cveriskpilot-${_ENV}-database-url-migrate/versions/latest
      env: DATABASE_URL

options:
  logging: GCS_ONLY
  machineType: E2_HIGHCPU_8
