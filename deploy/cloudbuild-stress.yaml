# =============================================================================
# CVERiskPilot — Cloud Build: Build → Deploy → Stress Test (500 analysts)
# =============================================================================
# Builds the app, deploys to Cloud Run (dev), waits for health, then runs
# the 500-analyst stress test against the live service.
#
# Usage:
#   gcloud builds submit \
#     --config=deploy/cloudbuild-stress.yaml \
#     --substitutions=_ENV=dev,_REGION=us-central1,_ANALYST_COUNT=500 \
#     .
#
# Results are printed to Cloud Build logs and saved as a build artifact.
# =============================================================================

steps:
  # ── Build Docker image ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cveriskpilot-web:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cveriskpilot-web:latest'
      - '-f'
      - 'deploy/Dockerfile'
      - '.'

  # ── Push image to GCR ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/cveriskpilot-web']
    waitFor: ['build']

  # ── Scale up Cloud Run for stress test ───────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-web'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'cveriskpilot-web-${_ENV}'
      - '--region=${_REGION}'
      - '--image=gcr.io/$PROJECT_ID/cveriskpilot-web:$SHORT_SHA'
      - '--platform=managed'
      - '--ingress=all'
      - '--allow-unauthenticated'
      - '--min-instances=2'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--timeout=60'
    waitFor: ['push']

  # ── Wait for service to be healthy ───────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'health-check'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe cveriskpilot-web-${_ENV} \
          --region=${_REGION} --format='value(status.url)')
        echo "Service URL: $$SERVICE_URL"
        echo "$$SERVICE_URL" > /workspace/service-url.txt

        echo "Waiting for health endpoint..."
        for i in $$(seq 1 30); do
          STATUS=$$(curl -s -o /dev/null -w '%{http_code}' "$$SERVICE_URL/api/health" || echo "000")
          echo "  Attempt $$i: HTTP $$STATUS"
          if [ "$$STATUS" = "200" ]; then
            echo "Service healthy!"
            exit 0
          fi
          sleep 5
        done
        echo "ERROR: Service did not become healthy after 150s"
        exit 1
    waitFor: ['deploy-web']

  # ── Run database migrations ──────────────────────────────────────────────
  - name: 'node:20'
    id: 'migrate'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci --ignore-scripts
        npx prisma migrate deploy --schema=packages/domain/prisma/schema.prisma
    secretEnv: ['DATABASE_URL']
    waitFor: ['health-check']

  # ── Run 500-analyst stress test ──────────────────────────────────────────
  - name: 'node:20'
    id: 'stress-test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$$(cat /workspace/service-url.txt)
        echo "Running stress test against: $$SERVICE_URL"
        echo "Analyst count: ${_ANALYST_COUNT}"
        echo ""

        npm ci --ignore-scripts
        npx tsx tests/stress/production-stress-500.ts "$$SERVICE_URL" ${_ANALYST_COUNT} 2>&1 | tee /workspace/stress-results.txt

        # Copy JSON results to workspace for artifact export
        cp tests/stress/results/stress-500-*.json /workspace/ 2>/dev/null || true

        echo ""
        echo "Stress test complete."
    waitFor: ['migrate']
    timeout: '1800s'

  # ── Scale back down after test ───────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'scale-down'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Scaling back to min-instances=0..."
        gcloud run services update cveriskpilot-web-${_ENV} \
          --region=${_REGION} \
          --min-instances=0 \
          --memory=512Mi \
          --cpu=1
    waitFor: ['stress-test']

substitutions:
  _ENV: 'dev'
  _REGION: 'us-central1'
  _ANALYST_COUNT: '500'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/cveriskpilot-${_ENV}-database-url/versions/latest
      env: DATABASE_URL

artifacts:
  objects:
    location: 'gs://${PROJECT_ID}-stress-results/'
    paths:
      - '/workspace/stress-results.txt'
      - '/workspace/stress-500-*.json'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  timeout: '2400s'
