# =============================================================================
# CVERiskPilot — Cloud Build: CI (lint, type-check, test)
# =============================================================================
# Trigger: pull requests / pushes for validation only.
# Deployment is handled by cloudbuild-deploy.yaml.
# =============================================================================

steps:
  # Install dependencies
  - name: 'node:20'
    id: 'install'
    entrypoint: 'npm'
    args: ['ci']

  # Generate Prisma client (required before type-check and tests)
  - name: 'node:20'
    id: 'prisma-generate'
    entrypoint: 'npx'
    args: ['prisma', 'generate', '--schema=packages/domain/prisma/schema.prisma']
    waitFor: ['install']

  # Type check
  - name: 'node:20'
    id: 'type-check'
    entrypoint: 'npm'
    args: ['run', 'type-check']
    waitFor: ['prisma-generate']

  # Lint
  - name: 'node:20'
    id: 'lint'
    entrypoint: 'npm'
    args: ['run', 'lint']
    waitFor: ['prisma-generate']

  # Test
  - name: 'node:20'
    id: 'test'
    entrypoint: 'npm'
    args: ['run', 'test']
    waitFor: ['prisma-generate']

  # ── Security: Semgrep SAST ───────────────────────────────────────────
  - name: 'returntocorp/semgrep'
    id: 'semgrep'
    entrypoint: 'semgrep'
    args:
      - 'scan'
      - '--config=auto'
      - '--config=p/owasp-top-ten'
      - '--config=p/typescript'
      - '--severity=ERROR'
      - '--exclude=node_modules'
      - '--exclude=.next'
      - '.'
    allowFailure: true
    waitFor: ['-']  # run immediately, parallel with other steps

  # ── Security: Gitleaks secrets scan ──────────────────────────────────
  - name: 'zricethezav/gitleaks:latest'
    id: 'gitleaks'
    args:
      - 'detect'
      - '--source=/workspace'
      - '--exit-code=1'
      - '--redact'
    allowFailure: true
    waitFor: ['-']

  # ── Security: CVERiskPilot compliance scan ───────────────────────────
  - name: 'node:20'
    id: 'crp-scan'
    entrypoint: 'npx'
    args: ['@cveriskpilot/scan@latest', '--preset=startup']
    allowFailure: true
    waitFor: ['install']

options:
  logging: CLOUD_LOGGING_ONLY
