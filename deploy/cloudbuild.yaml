steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  # Type check
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'type-check']

  # Lint
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'lint']

  # Test
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'test']

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cveriskpilot-web:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cveriskpilot-web:latest'
      - '-f'
      - 'deploy/Dockerfile'
      - '.'

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/cveriskpilot-web']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cveriskpilot-web'
      - '--image=gcr.io/$PROJECT_ID/cveriskpilot-web:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
