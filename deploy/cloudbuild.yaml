# =============================================================================
# CVERiskPilot — Cloud Build: CI (lint, type-check, test)
# =============================================================================
# Trigger: pull requests / pushes for validation only.
# Deployment is handled by cloudbuild-deploy.yaml.
# =============================================================================

steps:
  # Install dependencies
  - name: 'node:20'
    id: 'install'
    entrypoint: 'npm'
    args: ['ci']

  # Type check
  - name: 'node:20'
    id: 'type-check'
    entrypoint: 'npm'
    args: ['run', 'type-check']
    waitFor: ['install']

  # Lint
  - name: 'node:20'
    id: 'lint'
    entrypoint: 'npm'
    args: ['run', 'lint']
    waitFor: ['install']

  # Test
  - name: 'node:20'
    id: 'test'
    entrypoint: 'npm'
    args: ['run', 'test']
    waitFor: ['install']

options:
  logging: CLOUD_LOGGING_ONLY
