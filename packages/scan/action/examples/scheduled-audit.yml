name: Weekly Compliance Audit
on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run compliance scan
        id: scan
        uses: devbrewster/cveriskpilot-scan@main
        with:
          preset: enterprise
          fail-on: high
          comment: 'false'
          upload-sarif: 'true'

      - name: Create issue on failure
        if: steps.scan.outputs.exit-code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ steps.scan.outputs.total-findings }}';
            const critical = '${{ steps.scan.outputs.critical-count }}';
            const controls = '${{ steps.scan.outputs.controls-affected }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Compliance] Weekly audit: ${total} findings, ${controls} controls affected`,
              body: [
                '## Weekly Compliance Audit Results',
                '',
                `- **Total findings:** ${total}`,
                `- **Critical:** ${critical}`,
                `- **Controls affected:** ${controls}`,
                '',
                'Review the [Security tab](../../security/code-scanning) for full details.',
                '',
                '---',
                '*Auto-generated by CVERiskPilot compliance scan*'
              ].join('\n'),
              labels: ['compliance', 'security']
            });
