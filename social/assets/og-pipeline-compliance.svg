<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Hex logo mark -->
  <g transform="translate(80, 32)">
    <polygon points="22,0 44,12 44,36 22,48 0,36 0,12" fill="none" stroke="#0ee6f6" stroke-width="1.5" opacity="0.6"/>
    <polygon points="22,8 36,16 36,32 22,40 8,32 8,16" fill="none" stroke="#0ee6f6" stroke-width="1.2" opacity="0.8"/>
    <circle cx="22" cy="24" r="3" fill="#0ee6f6"/>
    <path d="M12,10 L8,12 L8,16" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M32,10 L36,12 L36,16" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M12,38 L8,36 L8,32" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
    <path d="M32,38 L36,36 L36,32" fill="none" stroke="#0ee6f6" stroke-width="1.2"/>
  </g>
  <text x="140" y="60" font-family="system-ui, sans-serif" font-size="20" font-weight="700">
    <tspan fill="#94a3b8">CVE</tspan><tspan fill="#0ee6f6">RiskPilot</tspan>
  </text>

  <!-- Title -->
  <text x="600" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="white">Pipeline Compliance Scanner</text>
  <text x="600" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">From Code to Compliance -- Automated</text>

  <!-- === FLOW DIAGRAM === -->
  <!-- Y center of flow: 320 -->

  <!-- Step 1: git push -->
  <g transform="translate(60, 240)">
    <rect width="160" height="100" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- git branch icon -->
    <g transform="translate(55, 20)">
      <circle cx="10" cy="10" r="5" fill="none" stroke="url(#blue)" stroke-width="2"/>
      <circle cx="40" cy="10" r="5" fill="none" stroke="url(#blue)" stroke-width="2"/>
      <circle cx="10" cy="40" r="5" fill="none" stroke="url(#blue)" stroke-width="2"/>
      <line x1="10" y1="15" x2="10" y2="35" stroke="url(#blue)" stroke-width="2"/>
      <path d="M40,15 Q40,30 25,35" fill="none" stroke="url(#blue)" stroke-width="2"/>
    </g>
    <text x="80" y="82" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="url(#blue)">git push</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(228, 288)">
    <line x1="0" y1="0" x2="48" y2="0" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4" filter="url(#glow)"/>
    <polygon points="48,-5 58,0 48,5" fill="#3b82f6"/>
  </g>

  <!-- Step 2: GitHub Action / GitLab CI -->
  <g transform="translate(294, 240)">
    <rect width="200" height="100" rx="14" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- CI gear icon -->
    <g transform="translate(76, 14)">
      <circle cx="24" cy="24" r="10" fill="none" stroke="url(#purple)" stroke-width="2"/>
      <circle cx="24" cy="24" r="4" fill="url(#purple)" opacity="0.6"/>
      <!-- gear teeth -->
      <line x1="24" y1="4" x2="24" y2="10" stroke="url(#purple)" stroke-width="2.5"/>
      <line x1="24" y1="38" x2="24" y2="44" stroke="url(#purple)" stroke-width="2.5"/>
      <line x1="4" y1="24" x2="10" y2="24" stroke="url(#purple)" stroke-width="2.5"/>
      <line x1="38" y1="24" x2="44" y2="24" stroke="url(#purple)" stroke-width="2.5"/>
      <line x1="10" y1="10" x2="15" y2="15" stroke="url(#purple)" stroke-width="2"/>
      <line x1="33" y1="33" x2="38" y2="38" stroke="url(#purple)" stroke-width="2"/>
      <line x1="38" y1="10" x2="33" y2="15" stroke="url(#purple)" stroke-width="2"/>
      <line x1="10" y1="38" x2="15" y2="33" stroke="url(#purple)" stroke-width="2"/>
    </g>
    <text x="100" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="url(#purple)">GitHub Action</text>
    <text x="100" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">/ GitLab CI</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(502, 288)">
    <line x1="0" y1="0" x2="48" y2="0" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,4" filter="url(#glow)"/>
    <polygon points="48,-5 58,0 48,5" fill="#8b5cf6"/>
  </g>

  <!-- Step 3: CVERiskPilot shield -->
  <g transform="translate(568, 225)">
    <rect width="185" height="130" rx="14" fill="#1e293b" stroke="#0ee6f6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)"/>
    <!-- Shield icon -->
    <g transform="translate(68, 12)">
      <path d="M24,2 L4,14 L4,32 C4,46 24,56 24,56 C24,56 44,46 44,32 L44,14 Z" fill="none" stroke="#0ee6f6" stroke-width="2"/>
      <path d="M24,18 L18,28 L22,28 L20,38 L32,24 L27,24 L30,18 Z" fill="#0ee6f6" opacity="0.7"/>
    </g>
    <text x="92" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700">
      <tspan fill="#94a3b8">CVE</tspan><tspan fill="#0ee6f6">RiskPilot</tspan>
    </text>
    <text x="92" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Analyze + Map</text>
    <text x="92" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Compliance</text>
  </g>

  <!-- Arrow 3 (fans out to three outputs) -->
  <g transform="translate(761, 288)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,4" filter="url(#glow)"/>
    <!-- Fan to top -->
    <line x1="30" y1="0" x2="58" y2="-52" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,4"/>
    <polygon points="56,-57 64,-49 54,-47" fill="#22c55e"/>
    <!-- Fan to middle -->
    <line x1="30" y1="0" x2="58" y2="0" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,4"/>
    <polygon points="58,-5 68,0 58,5" fill="#8b5cf6"/>
    <!-- Fan to bottom -->
    <line x1="30" y1="0" x2="58" y2="52" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,4"/>
    <polygon points="56,57 64,49 54,47" fill="#f59e0b"/>
  </g>

  <!-- Output 1: PR Comment (green) -->
  <g transform="translate(830, 215)">
    <rect width="185" height="50" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Chat bubble icon -->
    <g transform="translate(14, 10)">
      <rect width="24" height="18" rx="4" fill="none" stroke="#4ade80" stroke-width="1.5"/>
      <polygon points="6,18 10,26 14,18" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
      <line x1="6" y1="15" x2="18" y2="15" stroke="#4ade80" stroke-width="1"/>
      <line x1="6" y1="11" x2="18" y2="11" stroke="#4ade80" stroke-width="1"/>
    </g>
    <text x="110" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="url(#green)">PR Comment</text>
    <text x="110" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Inline findings on PRs</text>
  </g>

  <!-- Output 2: Compliance Map (purple) -->
  <g transform="translate(830, 273)">
    <rect width="185" height="50" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Grid/map icon -->
    <g transform="translate(14, 10)">
      <rect width="24" height="24" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <line x1="0" y1="12" x2="24" y2="12" stroke="#a78bfa" stroke-width="1"/>
      <line x1="12" y1="0" x2="12" y2="24" stroke="#a78bfa" stroke-width="1"/>
      <circle cx="6" cy="6" r="2" fill="#a78bfa" opacity="0.6"/>
      <circle cx="18" cy="18" r="2" fill="#a78bfa" opacity="0.6"/>
    </g>
    <text x="110" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="url(#purple)">Compliance Map</text>
    <text x="110" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">CVE-to-control mapping</text>
  </g>

  <!-- Output 3: Auto-POAM (amber) -->
  <g transform="translate(830, 331)">
    <rect width="185" height="50" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Document icon -->
    <g transform="translate(14, 8)">
      <path d="M2,0 L18,0 L24,6 L24,28 L2,28 Z" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <path d="M18,0 L18,6 L24,6" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <line x1="6" y1="12" x2="20" y2="12" stroke="#fbbf24" stroke-width="1"/>
      <line x1="6" y1="17" x2="18" y2="17" stroke="#fbbf24" stroke-width="1"/>
      <line x1="6" y1="22" x2="14" y2="22" stroke="#fbbf24" stroke-width="1"/>
    </g>
    <text x="110" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="url(#amber)">Auto-POAM</text>
    <text x="110" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Generated automatically</text>
  </g>

  <!-- Framework badges -->
  <g transform="translate(600, 440)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#475569">SUPPORTED FRAMEWORKS</text>

    <rect x="-310" y="14" width="108" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="-256" y="33" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">NIST 800-53</text>

    <rect x="-192" y="14" width="72" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="-156" y="33" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">CMMC</text>

    <rect x="-110" y="14" width="64" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="-78" y="33" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">SOC2</text>

    <rect x="-36" y="14" width="86" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="7" y="33" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">FedRAMP</text>

    <rect x="60" y="14" width="110" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="115" y="33" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">OWASP ASVS</text>

    <rect x="180" y="14" width="70" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="215" y="33" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">SSDF</text>

    <rect x="260" y="14" width="54" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="287" y="33" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">PCI</text>
  </g>

  <!-- Decorative grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="white"/>
    </pattern>
    <rect x="0" y="0" width="1200" height="675" fill="url(#dots)"/>
  </g>

  <!-- Bottom left: Veteran badge -->
  <g transform="translate(65, 600)">
    <rect width="200" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="100" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">100% Veteran Owned</text>
  </g>

  <!-- Bottom right: domain -->
  <g transform="translate(935, 600)">
    <rect width="200" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="100" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0ee6f6">cveriskpilot.com</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="670" width="1200" height="5" fill="url(#blue)"/>
</svg>