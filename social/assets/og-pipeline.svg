    <text x="182" y="199" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">POAM Export</text>
    <rect x="16" y="210" width="100" height="20" rx="4" fill="#0f172a"/>
    <text x="66" y="224" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">SLA Tracking</text>
    <rect x="122" y="210" width="120" height="20" rx="4" fill="#0f172a"/>
    <text x="182" y="224" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">Exec Reports</text>
