  <text x="600" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">From raw scan to prioritized action in minutes</text>

  <!-- Pipeline steps -->
  <!-- Step 1: Upload -->
  <g transform="translate(65, 220)">
    <rect width="200" height="240" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="100" cy="50" r="28" fill="url(#blue)" opacity="0.15"/>
    <text x="100" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24">&#x2B06;</text>
    <text x="100" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#blue)">STEP 1</text>
    <text x="100" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Upload</text>
    <text x="100" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Import scan results</text>
    <text x="100" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">from any scanner</text>
