    <text x="43" y="199" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Nessus</text>
    <rect x="77" y="185" width="50" height="20" rx="4" fill="#0f172a"/>
    <text x="102" y="199" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">SARIF</text>
    <rect x="133" y="185" width="50" height="20" rx="4" fill="#0f172a"/>
    <text x="158" y="199" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Qualys</text>
    <rect x="16" y="210" width="73" height="20" rx="4" fill="#0f172a"/>
    <text x="52" y="224" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">CycloneDX</text>
