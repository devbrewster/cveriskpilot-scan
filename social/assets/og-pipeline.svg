  <!-- Bottom stats -->
  <g transform="translate(0, 520)">
    <rect x="65" y="0" width="1070" height="80" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <line x1="332" y1="16" x2="332" y2="64" stroke="#334155" stroke-width="0.5"/>
    <line x1="600" y1="16" x2="600" y2="64" stroke="#334155" stroke-width="0.5"/>
    <line x1="867" y1="16" x2="867" y2="64" stroke="#334155" stroke-width="0.5"/>

    <text x="198" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="url(#blue)">11</text>
    <text x="198" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Scanner Formats</text>

    <text x="466" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="url(#orange)">3</text>
    <text x="466" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Intel Sources</text>

    <text x="733" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="url(#purple)">4</text>
    <text x="733" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">AI Agents</text>

    <text x="1000" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="url(#green)">5</text>
    <text x="1000" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Compliance Frameworks</text>
  </g>

  <!-- Footer line -->
  <text x="600" y="645" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">cveriskpilot.com | 100% Veteran Owned</text>
  <rect x="0" y="670" width="1200" height="5" fill="url(#blue)"/>
</svg>
