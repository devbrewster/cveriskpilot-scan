<svg xmlns="http://www.w3.org/2000/svg" width="820" height="720" viewBox="0 0 820 720">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .bg { fill: #1a1b26; }
      .titlebar { fill: #24283b; }
      .dot-red { fill: #f7768e; }
      .dot-yellow { fill: #e0af68; }
      .dot-green { fill: #9ece6a; }
      .title-text { fill: #a9b1d6; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
      .text { fill: #a9b1d6; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
      .text-bold { fill: #c0caf5; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 700; }
      .text-dim { fill: #565f89; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
      .text-cyan { fill: #7dcfff; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
      .text-cyan-bold { fill: #7dcfff; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 700; }
      .text-red { fill: #f7768e; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
      .text-red-bold { fill: #f7768e; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 700; }
      .text-yellow { fill: #e0af68; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
      .text-green { fill: #9ece6a; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
      .text-magenta { fill: #bb9af7; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
      .text-white-bold { fill: #ffffff; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 700; }
      .badge-crit { fill: #f7768e; }
      .badge-high { fill: #ff9e64; }
      .badge-text { fill: #1a1b26; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 11px; font-weight: 700; }
      .prompt { fill: #9ece6a; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 700; }
      .cmd { fill: #c0caf5; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
      .separator { stroke: #3b4261; stroke-width: 1; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect class="bg" width="820" height="720" rx="10" ry="10"/>
  <rect class="titlebar" width="820" height="36" rx="10" ry="10"/>
  <rect class="titlebar" y="26" width="820" height="10"/>

  <!-- Traffic lights -->
  <circle class="dot-red" cx="20" cy="18" r="6"/>
  <circle class="dot-yellow" cx="40" cy="18" r="6"/>
  <circle class="dot-green" cx="60" cy="18" r="6"/>
  <text class="title-text" x="410" y="22" text-anchor="middle">crp-scan --preset startup /home/user/myproject</text>

  <!-- Command prompt -->
  <text class="prompt" x="20" y="60">$</text>
  <text class="cmd" x="35" y="60">crp-scan --preset startup --severity HIGH</text>

  <!-- Header -->
  <text class="text-cyan-bold" x="20" y="92">  CVERiskPilot Scan Results</text>
  <text class="text-dim" x="20" y="110">  2026-03-28T14:32:01.847Z  |  sbom, iac, secrets  |  1.2s</text>

  <!-- Summary section -->
  <text class="text-bold" x="20" y="140">  Summary</text>
  <text y="160">
    <tspan class="text-red-bold" x="20">  28</tspan>
    <tspan class="text"> critical  </tspan>
    <tspan class="text-red">3</tspan>
    <tspan class="text"> high  </tspan>
    <tspan class="text-yellow">0</tspan>
    <tspan class="text"> medium  </tspan>
    <tspan class="text-cyan">0</tspan>
    <tspan class="text"> low  </tspan>
    <tspan class="text-dim">0</tspan>
    <tspan class="text"> info</tspan>
  </text>
  <text class="text-dim" x="20" y="178">  Total: 31 findings</text>

  <text class="text-cyan" x="20" y="200">  Dependencies:</text>
  <text class="text" x="155" y="200">842 packages (npm)</text>
  <text class="text-cyan" x="20" y="218">  Secrets scan:</text>
  <text class="text" x="148" y="218">873 files scanned</text>
  <text class="text-cyan" x="20" y="236">  IaC scan:</text>
  <text class="text" x="115" y="236">22 files, 28 rules passed, 1 failed</text>

