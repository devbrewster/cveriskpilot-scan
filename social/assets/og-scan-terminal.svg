  <!-- Row 1 -->
  <rect class="badge-crit" x="20" y="286" width="72" height="17" rx="3"/>
  <text class="badge-text" x="28" y="299">CRITICAL</text>
  <text class="text-white-bold" x="100" y="299">Prototype Pollution in lodash</text>
  <text class="text-dim" x="380" y="299">CWE-77</text>
  <text class="text-dim" x="450" y="299">lodash.merge</text>
  <text class="text-magenta" x="570" y="299">sbom</text>

  <!-- Row 2 -->
  <rect class="badge-crit" x="20" y="308" width="72" height="17" rx="3"/>
  <text class="badge-text" x="28" y="321">CRITICAL</text>
  <text class="text-white-bold" x="100" y="321">Prototype Pollution in lodash</text>
  <text class="text-dim" x="380" y="321">CWE-77</text>
  <text class="text-dim" x="450" y="321">lodash.defaults</text>
  <text class="text-magenta" x="570" y="321">sbom</text>

  <!-- Row 3 -->
  <rect class="badge-crit" x="20" y="330" width="72" height="17" rx="3"/>
  <text class="badge-text" x="28" y="343">CRITICAL</text>
  <text class="text-white-bold" x="100" y="343">Prototype Pollution in lodash</text>
  <text class="text-dim" x="380" y="343">CWE-77</text>
  <text class="text-dim" x="450" y="343">lodash.flatten</text>
  <text class="text-magenta" x="570" y="343">sbom</text>

  <!-- Row 4 -->
  <rect class="badge-crit" x="20" y="352" width="72" height="17" rx="3"/>
  <text class="badge-text" x="28" y="365">CRITICAL</text>
  <text class="text-white-bold" x="100" y="365">Database Connection String...</text>
  <text class="text-dim" x="380" y="365">CWE-798</text>
  <text class="text-dim" x="450" y="365">.env.local:2</text>
  <text class="text-magenta" x="570" y="365">secrets</text>

  <!-- Row 5 -->
  <rect class="badge-crit" x="20" y="374" width="72" height="17" rx="3"/>
  <text class="badge-text" x="28" y="387">CRITICAL</text>
  <text class="text-white-bold" x="100" y="387">Stripe Secret Key detected...</text>
  <text class="text-dim" x="380" y="387">CWE-798</text>
  <text class="text-dim" x="450" y="387">.env.local:25</text>
  <text class="text-magenta" x="570" y="387">secrets</text>

  <!-- Row 6 -->
  <rect class="badge-crit" x="20" y="396" width="72" height="17" rx="3"/>
  <text class="badge-text" x="28" y="409">CRITICAL</text>
  <text class="text-white-bold" x="100" y="409">RSA Private Key detected...</text>
  <text class="text-dim" x="380" y="409">CWE-321</text>
  <text class="text-dim" x="450" y="409">config/key.pem</text>
  <text class="text-magenta" x="570" y="409">secrets</text>

  <!-- Row 7 -->
  <rect class="badge-high" x="20" y="418" width="55" height="17" rx="3"/>
  <text class="badge-text" x="30" y="431">HIGH</text>
  <text class="text-white-bold" x="100" y="431">Anthropic API Key detected...</text>
  <text class="text-dim" x="380" y="431">CWE-798</text>
  <text class="text-dim" x="450" y="431">.env.local:24</text>
  <text class="text-magenta" x="570" y="431">secrets</text>

  <!-- Row 8 -->
  <rect class="badge-high" x="20" y="440" width="55" height="17" rx="3"/>
  <text class="badge-text" x="30" y="453">HIGH</text>
  <text class="text-white-bold" x="100" y="453">S3 bucket lacks encryption</text>
  <text class="text-dim" x="380" y="453">CWE-311</text>
  <text class="text-dim" x="450" y="453">infra/main.tf:42</text>
  <text class="text-magenta" x="570" y="453">iac</text>

  <!-- More indicator -->
  <text class="text-dim" x="20" y="478">  ... 23 more findings</text>

  <!-- Compliance Impact section -->
  <text class="text-bold" x="20" y="512">  Compliance Impact</text>
  <line class="separator" x1="20" y1="522" x2="800" y2="522"/>

  <!-- SOC 2 row -->
  <text class="text-cyan" x="20" y="544">  SOC 2 Type II</text>
  <text class="text-yellow" x="200" y="544">3 controls affected</text>
  <text class="text-dim" x="390" y="544">CC6.8, CC6.1, CC8.1</text>

