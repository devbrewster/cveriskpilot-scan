  <text class="text-yellow" x="200" y="566">6 controls affected</text>
  <text class="text-dim" x="390" y="566">V5.1, V10.3, V1.2, V14.2, V1.1, V9.1</text>

  <text class="text-dim" x="20" y="592">  Total: 9 controls affected across 2 frameworks</text>

  <!-- Verdict -->
  <text class="text-bold" x="20" y="624">  Exit Status</text>
  <text class="text-red-bold" x="20" y="646">  FAIL</text>
  <text class="text" x="62" y="646"> 28 finding(s) at or above CRITICAL severity.</text>
  <text class="text-dim" x="20" y="664">  Exit code: 1</text>

  <!-- Bottom prompt -->
  <text class="prompt" x="20" y="698">$</text>
  <rect class="text-green" x="35" y="688" width="8" height="14" opacity="0.7"/>
